version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: real_estate_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: listings_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d listings_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: real_estate_web
    restart: always
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/listings_db

volumes:
  postgres_data:
